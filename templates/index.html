    <script>
 function playYoutube(index, title, artist) {
    const container = document.getElementById(`yt-${index}`);
    
    if (container.innerHTML) {
        container.style.display = container.style.display === "none" ? "block" : "none";
        return;
    }

    fetch("/youtube", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, artist })
    })
    .then(res => res.json())
    .then(data => {
        if (data.video_id) {
            container.innerHTML = `
                <iframe 
                    width="100%" 
                    height="200" 
                    src="https://www.youtube.com/embed/${data.video_id}" 
                    frameborder="0" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen
                    onerror="this.style.display='none'">
                </iframe>
                <a href="https://www.youtube.com/watch?v=${data.video_id}" 
                   target="_blank" 
                   class="lastfm-link" 
                   style="display:block;margin-top:0.4rem;">
                   🎬 Can't embed? Watch on YouTube
                </a>`;
            container.style.display = "block";
        } else {
            container.innerHTML = "<p style='color:#c44569;font-size:0.85rem;padding:0.5rem 0;'>No video found.</p>";
            container.style.display = "block";
        }
    });
}
function tryEmbed(container, videoIds, index) {
    if (index >= videoIds.length) {
        container.innerHTML = "<p style='color:#c44569;font-size:0.85rem;'>No embeddable video found.</p>";
        container.style.display = "block";
        return;
    }

    const videoId = videoIds[index];
    container.style.display = "block";
    container.innerHTML = `
        <iframe 
            width="100%" 
            height="200" 
            src="https://www.youtube.com/embed/${videoId}?autoplay=1" 
            frameborder="0" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>`;

    setTimeout(() => {
        fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`)
            .then(r => { if (!r.ok) tryEmbed(container, videoIds, index + 1); })
            .catch(() => tryEmbed(container, videoIds, index + 1));
    }, 2000);
}
        function selectMood(mood) {
            document.getElementById("mood-input").value = mood;
            submitMood();
        }

        function submitMood() {
            const mood = document.getElementById("mood-input").value.trim();
            const genre = document.getElementById("genre-input").value.trim();
            if (!mood) return;

            document.getElementById("result-section").style.display = "none";
            document.getElementById("playlist").innerHTML = "<p style='text-align:center;color:#c44569;'>Finding your perfect songs...</p>";
            document.getElementById("result-section").style.display = "block";

            fetch("/recommend", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ mood, genre })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("mood-pill").textContent = "✨ " + data.mood.toUpperCase();

                const playlist = document.getElementById("playlist");
                playlist.innerHTML = "";

                data.songs.forEach((song, i) => {
                    const tags = song.tags.map(t => `<span class="tag">${t}</span>`).join(" ");
                    const listeners = song.listeners ? `👥 ${song.listeners.toLocaleString()} listeners` : "";
                    playlist.innerHTML += `
                        <div class="song-card">
                            <div class="song-number">Track ${String(i+1).padStart(2,"0")}</div>
                            <div class="song-title">${song.title}</div>
                            <div class="song-meta">
                                <span>🎤 ${song.artist}</span>
                                <span>🔥 ${song.popularity} popularity</span>
                                <span>${listeners}</span>
                                <a class="lastfm-link" href="${song.url}" target="_blank">▶ Last.fm</a>
                                <a class="lastfm-link" href="javascript:void(0)" onclick="playYoutube(${i}, '${song.title.replace(/'/g, "\\'")}', '${song.artist.replace(/'/g, "\\'")}')">▶ Play</a>
                            </div>
                            <div style="margin-top:0.4rem">${tags}</div>
                            <div id="yt-${i}" style="display:none; margin-top:0.8rem; border-radius:12px; overflow:hidden;"></div> 
                        </div>`;
                });
            });
        }

        document.getElementById("mood-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") submitMood();
        });
    </script>
